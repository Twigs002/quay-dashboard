name: Update Dashboard Data

on:
  schedule:
          # Runs at 05:00 AM SAST (00:27 UTC) every weekday Monday-Friday (scheduled early to account for GitHub Actions delay)
          - cron: '27 0 * * 1-5'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-update:
    name: Fetch DialFire data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch DialFire data
        env:
          DIALFIRE_TENANT_ID:    ${{ secrets.DIALFIRE_TENANT_ID }}
          DIALFIRE_TENANT_TOKEN: ${{ secrets.DIALFIRE_TENANT_TOKEN }}
          DIALFIRE_CAMPAIGNS:    ${{ secrets.DIALFIRE_CAMPAIGNS }}
          CAMPAIGN_CLIENTHUB_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_ID }}
          CAMPAIGN_CLIENTHUB_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_TOKEN }}
          CAMPAIGN_CLIENTHUB_NEW_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_ID }}
          CAMPAIGN_CLIENTHUB_NEW_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NEW_TOKEN }}
          CAMPAIGN_1_ID: ${{ secrets.CAMPAIGN_1_ID }}
          CAMPAIGN_1_TOKEN: ${{ secrets.CAMPAIGN_1_TOKEN }}
          CAMPAIGN_2_ID: ${{ secrets.CAMPAIGN_2_ID }}
          CAMPAIGN_2_TOKEN: ${{ secrets.CAMPAIGN_2_TOKEN }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_ID: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_ID }}
          CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN: ${{ secrets.CAMPAIGN_CLIENTHUB_NO_ANSWER_TOKEN }}
        run: python scripts/fetch_dialfire.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/weekly_data.json data/history.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "auto-update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
