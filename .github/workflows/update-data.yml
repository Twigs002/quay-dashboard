name: Update Dashboard Data
on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch DialFire data
        env:
          DIALFIRE_TENANT_ID: ${{ secrets.DIALFIRE_TENANT_ID }}
          DIALFIRE_TENANT_TOKEN: ${{ secrets.DIALFIRE_TENANT_TOKEN }}
        run: python scripts/fetch_dialfire.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly_data.json data/history.json
          git diff --staged --quiet || git commit -m "📊 Auto-update $(date -u +%Y-%m-%d)"
          git push
